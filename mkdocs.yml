site_name: 手术器械护士机器助手
site_description: 手术器械护士机器助手项目文档
site_author: SurgBot Team

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
  generator: false

copyright: "SurgBot Team &mdash; 文档版本 v0.2.0 &mdash; 最近更新 2026-03-18"

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 项目背景:
    - 项目简介: overview/introduction.md
    - 团队成员: overview/team.md
    - 硬件平台: overview/hardware.md
  - 系统设计:
    - 系统架构: overview/architecture.md
    - 人机协同方案: overview/human_robot_collab.md
    - 模块接口规范: overview/interfaces.md
    - 系统安全约束: overview/safety_constraints.md
  - 模块文档:
    - 感知模块:
      - 概述: modules/perception/index.md
      - YOLO 器械检测: modules/perception/yolo_detection.md
      - 相机标定: modules/perception/camera_calibration.md
      - 夹取点算法: modules/perception/grasp_algorithm.md
    - NLP 模块:
      - 概述: modules/nlp/index.md
      - Qwen2.5 SFT 微调: modules/nlp/qwen_sft.md
      - DPO 对齐优化: modules/nlp/dpo_alignment.md
      - 器械标准化词库: modules/nlp/instrument_vocab.md
    - 决策模块:
      - 概述: modules/decision/index.md
      - OpenVLA 进展: modules/decision/openvla_progress.md
      - LIBERO 仿真评测: modules/decision/libero_eval.md
      - 数据流水线: modules/decision/data_pipeline.md
    - 执行模块:
      - 概述: modules/execution/index.md
      - CR5 控制接口: modules/execution/dobot_cr5_control.md
      - 运动规划: modules/execution/motion_planning.md
      - 安全策略: modules/execution/safety_strategy.md
    - 仿真模块:
      - 概述: modules/simulation/index.md
      - Isaac Sim 环境搭建: modules/simulation/isaac_sim_setup.md
      - 虚拟手术室方案: modules/simulation/surgery_room_sim.md
  - 项目进展:
    - Sim2Real 仪表盘: progress/sim2real_dashboard.md
    - 全局问题追踪: progress/issue_tracker.md
    - 2026年2月现场测试: progress/field_test_202602.md
    - OpenVLA 阶段进展: progress/openvla_status.md
    - 里程碑: progress/milestones.md
  - 会议记录:
    - meeting/index.md
    - 2026/02/05 现场测试评审: meeting/2026/0205_field_review.md
  - 测试记录:
    - 测试计划: testing/index.md
    - 2026年2月现场测试: testing/records/202602_onsite.md
  - 成员工作:
    - 陈端端: members/chen_duanduan.md
    - 李淑雅: members/li_shuya.md
    - 任松: members/ren_song.md
